{% extends "base.html" %}
{% block title %}Add expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Add expense</h1>
      <p class="auth-subtitle">Record a new transaction</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('add_expense') }}">
        <!-- Amount (₹) -->
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" name="amount"
                 class="form-input" step="0.01" min="0.01"
                 placeholder="e.g. 250.00"
                 value="{{ amount | default('') }}" required autofocus>
        </div>

        <!-- Category dropdown -->
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            <option value="" disabled
              {% if not category %}selected{% endif %}>
              Choose a category
            </option>
            {% for cat in categories %}
            <option value="{{ cat }}"
              {% if category == cat %}selected{% endif %}>
              {{ cat }}
            </option>
            {% endfor %}
          </select>
        </div>

        <!-- Date -->
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date"
                 class="form-input"
                 value="{{ date | default('') }}" required>
        </div>

        <!-- Description (optional) -->
        <div class="form-group">
          <label for="description">Description <span class="form-hint">(optional)</span></label>
          <input type="text" id="description" name="description"
                 class="form-input" placeholder="What was this for?"
                 maxlength="200"
                 value="{{ description | default('') }}">
        </div>

        <button type="submit" class="btn-submit">Add expense</button>
      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('profile') }}">← Back to dashboard</a>
    </p>
  </div>
</section>
{% endblock %}
